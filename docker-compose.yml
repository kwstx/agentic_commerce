services:
  db:
    image: postgres:15
    container_name: agentic_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentic_commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agentic_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
